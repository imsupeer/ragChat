version: '3.9'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: rag-backend
    env_file:
      - ../backend/.env
    ports:
      - '8000:8000'
    volumes:
      - ../backend:/app
      - ../vector_db:/app/vector_db
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: rag-frontend
    env_file:
      - ../frontend/.env
    ports:
      - '3000:3000'
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: rag-llama-server
    volumes:
      - ../models/demo:/models:ro
    ports:
      - '11435:11435'
    command:
      - -m
      - /models/model.gguf
      - --host
      - '0.0.0.0'
      - --port
      - '11435'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:11435/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  backend:
    environment:
      LLM_PROVIDER: llama_cpp
      EMBEDDINGS_PROVIDER: local_hash
      LLAMA_CPP_BASE_URL: http://llama-server:11435
      LLAMA_CPP_CHAT_MODEL: model.gguf
    depends_on:
      llama-server:
        condition: service_healthy

  frontend:
    depends_on:
      - backend
